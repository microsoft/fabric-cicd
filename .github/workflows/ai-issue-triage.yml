name: "AI Issue Triage"

on:
    issues:
        types: [labeled]
    workflow_dispatch:
        inputs:
            issue_number:
                description: "Issue number to triage"
                required: true
                type: number

jobs:
    ai-triage:
        if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'needs triage'
        runs-on: ubuntu-latest
        permissions:
            issues: write
            models: read
            contents: read

        env:
            # -------------------------------------------------------
            # Phase control — toggle these two flags to switch phases:
            #   Testing (fork):   suppress both  → true  / true
            #   Production:       enable both    → false / false
            # -------------------------------------------------------
            SUPPRESS_LABELS: "false"
            SUPPRESS_COMMENTS: "false"

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Resolve issue details
              id: issue
              uses: actions/github-script@v7
              with:
                  script: |
                      const issueNumber = context.payload.issue?.number || ${{ inputs.issue_number || 0 }};
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;

                      const { data: issue } = await github.rest.issues.get({
                        owner, repo, issue_number: issueNumber,
                      });

                      // Detect re-triage: check if any ai: labels exist from a prior assessment
                      const hasAiLabels = issue.labels.some(l => l.name.startsWith('ai:'));

                      // Check for prior AI assessment comments
                      const { data: comments } = await github.rest.issues.listComments({
                        owner, repo, issue_number: issueNumber, per_page: 100,
                      });
                      const hasAiComment = comments.some(c =>
                        c.body && c.body.includes('### AI Assessment:')
                      );

                      const isRetriage = hasAiLabels || hasAiComment;
                      let issueBody = issue.body || '';

                      if (isRetriage) {
                        // Find the last AI comment index
                        const lastAiIdx = comments.reduce((acc, c, i) =>
                          c.body && c.body.includes('### AI Assessment:') ? i : acc, -1);

                        // Collect author replies after the last AI comment
                        const authorReplies = comments
                          .slice(lastAiIdx + 1)
                          .filter(c => c.user.login === issue.user.login)
                          .map(c => c.body)
                          .join('\n\n---\n\n');

                        if (authorReplies) {
                          issueBody = `[RE-TRIAGE] The author has provided additional information in response to a prior AI assessment.\n\n`
                            + `## Original Issue Summary\n${issue.title}\n\n`
                            + `## Author's Follow-up Response\n${authorReplies}\n\n`
                            + `Focus your assessment on the new information provided above. Reference the original issue only if needed for context.`;
                        }
                      }

                      // Gather recent merged PRs so the model can recognise issues that are
                      // already fixed by a change merged into main (possibly not yet released).
                      try {
                        let latestReleaseTag = null;
                        let latestReleaseDate = null;
                        try {
                          const { data: rel } = await github.rest.repos.getLatestRelease({ owner, repo });
                          latestReleaseTag = rel.tag_name;
                          latestReleaseDate = rel.published_at;
                        } catch (e) {
                          core.info(`No published release found: ${e.message}`);
                        }

                        const { data: closedPrs } = await github.rest.pulls.list({
                          owner, repo, state: 'closed', sort: 'updated', direction: 'desc', per_page: 50,
                        });

                        const merged = closedPrs
                          .filter(pr => pr.merged_at)
                          .filter(pr => pr.user?.login !== 'dependabot[bot]' && !/^Bump\s/i.test(pr.title))
                          .sort((a, b) => new Date(b.merged_at) - new Date(a.merged_at))
                          .slice(0, 30);

                        if (merged.length) {
                          const lines = merged
                            .map(pr => `- #${pr.number} (merged ${pr.merged_at.slice(0, 10)}): ${pr.title}`)
                            .join('\n');
                          const releaseNote = latestReleaseTag
                            ? `Latest published release: ${latestReleaseTag} (${(latestReleaseDate || '').slice(0, 10)}). The pull requests below are merged into the main branch; some may not be in a published release yet.`
                            : `The pull requests below are recently merged into the main branch.`;
                          issueBody = `${issueBody}\n\n---\n\n## Recent Repository Changes\n\n${releaseNote}\n\n${lines}\n\n`
                            + `If the reported issue is already fixed or implemented by one of these merged PRs, identify it and cite the PR number. Only cite a PR from this list — do not invent PR numbers.`;
                        }
                      } catch (e) {
                        core.info(`Could not gather recent repository changes: ${e.message}`);
                      }

                      // ------------------------------------------------------------------
                      // Code awareness: ground the triage model in the actual repository.
                      //   (B) Repository Facts — a small, stable digest generated from source
                      //       (item types, public API, module layout) so the model reasons
                      //       from what the library actually supports instead of guessing.
                      //   (A) Relevant Code Context — symbols/paths the reporter mentioned are
                      //       grepped against the checked-out tree and the matching snippets
                      //       are injected so the model checks the report against real code.
                      // Both are best-effort and must never fail triage.
                      // ------------------------------------------------------------------
                      try {
                        const fs = require('fs');
                        const { execFileSync } = require('child_process');

                        const readSafe = (p) => {
                          try { return fs.readFileSync(p, 'utf8'); } catch (e) { return ''; }
                        };
                        const gitLines = (args) => {
                          try {
                            return execFileSync('git', args, { encoding: 'utf8', maxBuffer: 20 * 1024 * 1024 })
                              .split('\n').filter(Boolean);
                          } catch (e) {
                            // git grep exits 1 when there are no matches — that is not an error.
                            if (e.status === 1) return [];
                            core.info(`git ${args.join(' ')} failed: ${e.message}`);
                            return [];
                          }
                        };

                        // ---- (B) Repository Facts -----------------------------------------
                        const factParts = [];
                        const constantsSrc = readSafe('src/fabric_cicd/constants.py');
                        if (constantsSrc) {
                          const verMatch = constantsSrc.match(/^VERSION\s*=\s*["']([^"']+)["']/m);
                          if (verMatch) factParts.push('- Package version (current `main`): `' + verMatch[1] + '`');

                          const itemStart = constantsSrc.indexOf('class ItemType');
                          if (itemStart !== -1) {
                            let itemBlock = constantsSrc.slice(itemStart);
                            const cut = itemBlock.indexOf('SERIAL_ITEM_PUBLISH_ORDER');
                            if (cut !== -1) itemBlock = itemBlock.slice(0, cut);
                            const types = [...itemBlock.matchAll(/=\s*"([A-Za-z0-9]+)"/g)].map(m => m[1]);
                            if (types.length) {
                              factParts.push('- Supported `ItemType` values (' + types.length + '): '
                                + types.map(t => '`' + t + '`').join(', '));
                            }
                          }
                        }

                        const initSrc = readSafe('src/fabric_cicd/__init__.py');
                        if (initSrc) {
                          const allMatch = initSrc.match(/__all__\s*=\s*\[([\s\S]*?)\]/);
                          if (allMatch) {
                            const exports = [...allMatch[1].matchAll(/["']([^"']+)["']/g)].map(m => m[1]);
                            if (exports.length) {
                              factParts.push('- Public API (importable from `fabric_cicd`): '
                                + exports.map(e => '`' + e + '`').join(', '));
                            }
                          }
                        }

                        const moduleFiles = gitLines(['ls-files', 'src/fabric_cicd']).filter(f => f.endsWith('.py'));
                        if (moduleFiles.length) {
                          const base = (f) => f.split('/').pop();
                          const top = moduleFiles.filter(f => f.split('/').length === 3).map(base);
                          const itemMods = moduleFiles.filter(f => f.includes('/_items/')).map(base);
                          const commonMods = moduleFiles.filter(f => f.includes('/_common/')).map(base);
                          const layout = [];
                          if (top.length) layout.push('  - top-level: ' + top.join(', '));
                          if (itemMods.length) layout.push('  - _items/ (per-item publishers): ' + itemMods.join(', '));
                          if (commonMods.length) layout.push('  - _common/ (shared utilities): ' + commonMods.join(', '));
                          if (layout.length) factParts.push('- Module layout under `src/fabric_cicd/`:\n' + layout.join('\n'));
                        }

                        if (factParts.length) {
                          issueBody = issueBody + '\n\n---\n\n## Repository Facts\n\n'
                            + 'The facts below are generated from the current `main` branch source. Treat them as authoritative for what the library currently supports. Do not contradict them or invent item types, public functions, or modules that are not listed here.\n\n'
                            + factParts.join('\n') + '\n';
                        }

                        // ---- (A) Relevant Code Context ------------------------------------
                        const sourceText = (issue.title || '') + '\n' + (issue.body || '');

                        // Collect candidate symbols/paths the reporter actually mentioned.
                        // "strong" tokens come from backtick code spans or file paths (explicitly
                        // marked as code). "weak" tokens come from free prose and are kept only if
                        // they look like code (contain _ $ . / or an interior capital), so common
                        // English words ("does", "expected", "resolved") do not become search terms.
                        const norm = (t) => t.trim().replace(/^[.\-/]+|[.\-/]+$/g, '');
                        const codeLike = (t) => /[_$./]/.test(t) || /[A-Z]/.test(t.slice(1));
                        const strong = [];
                        const weak = [];
                        for (const m of sourceText.matchAll(/`([^`]+)`/g)) {
                          for (const sub of m[1].split(/[^A-Za-z0-9_$./-]+/)) strong.push(norm(sub));
                        }
                        for (const m of sourceText.matchAll(/\b[\w./-]+\.(?:py|ya?ml|md|json|toml)\b/g)) strong.push(norm(m[0]));
                        for (const m of sourceText.matchAll(/\$?[A-Za-z_][A-Za-z0-9_]{3,}(?:\.[A-Za-z_][A-Za-z0-9_]*)*/g)) weak.push(norm(m[0]));

                        const STOP = new Set([
                          'fabric','cicd','fabric_cicd','python','version','error','errors','issue','github',
                          'microsoft','workspace','repository','directory','true','false','none','null','import',
                          'from','self','return','value','values','should','would','could','where','which','there',
                          'about','using','published','release','branch','assessment','triage','example','description',
                        ]);
                        const valid = (t) => /^[A-Za-z0-9_$][A-Za-z0-9_$./-]{2,60}$/.test(t)
                          && !/^\d+$/.test(t) && !STOP.has(t.toLowerCase());
                        // Strong tokens kept first so they survive the cap; weak tokens filtered to code-like.
                        const clean = [...new Set([...strong, ...weak.filter(codeLike)].filter(valid))].slice(0, 24);

                        const fileScores = new Map(); // file -> { tokens:Set, score:number, hits:number, lines:Set }
                        for (const tok of clean) {
                          const hits = gitLines(['grep', '--no-color', '-n', '-I', '-F', '-e', tok, '--', 'src', 'docs', 'sample']);
                          const gh = hits.length;
                          // Drop only tokens that do not exist or are so common they carry no
                          // signal (e.g. "name"). Central feature terms stay but are down-weighted.
                          if (gh === 0 || gh > 300) continue;
                          const weight = 1 / Math.log2(gh + 2); // rarer terms carry more signal
                          for (const h of hits.slice(0, 80)) {
                            const sep1 = h.indexOf(':');
                            const sep2 = h.indexOf(':', sep1 + 1);
                            if (sep1 < 0 || sep2 < 0) continue;
                            const file = h.slice(0, sep1);
                            const lineNo = parseInt(h.slice(sep1 + 1, sep2), 10);
                            if (!/\.(py|ya?ml|md)$/.test(file) || file === 'docs/changelog.md') continue;
                            if (!fileScores.has(file)) fileScores.set(file, { tokens: new Set(), score: 0, hits: 0, lines: new Set() });
                            const rec = fileScores.get(file);
                            if (!rec.tokens.has(tok)) { rec.tokens.add(tok); rec.score += weight; }
                            rec.hits += 1;
                            if (Number.isFinite(lineNo) && rec.lines.size < 12) rec.lines.add(lineNo);
                          }
                        }

                        // Rank by cumulative token weight; nudge implementation files above docs.
                        const ranked = [...fileScores.entries()]
                          .map(([f, r]) => [f, r, r.score * (f.startsWith('src/') ? 1.15 : 1)])
                          .sort((a, b) => (b[2] - a[2]) || (b[1].hits - a[1].hits))
                          .slice(0, 4)
                          .map(([f, r]) => [f, r]);

                        const snippetBlocks = [];
                        let budget = 6000; // total chars of injected code context
                        for (const [file, rec] of ranked) {
                          if (budget <= 0) break;
                          const content = readSafe(file);
                          if (!content) continue;
                          const fileLines = content.split('\n');
                          const wanted = [...rec.lines].sort((a, b) => a - b).slice(0, 2);
                          // Merge overlapping context windows around the chosen hit lines.
                          const ranges = [];
                          for (const ln of wanted) {
                            const start = Math.max(1, ln - 6);
                            const end = Math.min(fileLines.length, ln + 6);
                            const last = ranges[ranges.length - 1];
                            if (last && start <= last.end + 1) last.end = Math.max(last.end, end);
                            else ranges.push({ start, end });
                          }
                          let snippet = '';
                          for (const r of ranges) {
                            for (let i = r.start; i <= r.end; i++) snippet += i + ': ' + fileLines[i - 1] + '\n';
                            snippet += '...\n';
                          }
                          snippet = snippet.slice(0, 2000);
                          budget -= snippet.length;
                          const lang = file.endsWith('.py') ? 'python' : (file.endsWith('.md') ? 'markdown' : 'yaml');
                          snippetBlocks.push(
                            '### `' + file + '` (matched: ' + [...rec.tokens].slice(0, 6).join(', ') + ')\n\n'
                            + '```' + lang + '\n' + snippet + '```\n'
                          );
                        }

                        if (snippetBlocks.length) {
                          issueBody = issueBody + '\n\n---\n\n## Relevant Code Context\n\n'
                            + 'These snippets are from files in the current `main` branch that mention symbols or paths referenced in this issue. Use them to ground your assessment in the real code: confirm whether the reported behavior matches the implementation, and if the code clearly contradicts the report, say so. Only reason about code shown here or in the facts above — do not assume unshown code exists.\n\n'
                            + snippetBlocks.join('\n');
                        }
                      } catch (e) {
                        core.info(`Could not build code-awareness context: ${e.message}`);
                      }

                      core.setOutput('number', issue.number);
                      core.setOutput('body', issueBody);
                      core.setOutput('title', issue.title);
                      core.setOutput('html_url', issue.html_url);
                      core.setOutput('labels', issue.labels.map(l => l.name).join(','));
                      core.setOutput('author', issue.user.login);
                      core.setOutput('is_retriage', isRetriage.toString());

            - name: Run AI assessment
              id: ai-assessment
              uses: github/ai-assessment-comment-labeler@v1.0.1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  issue_number: ${{ steps.issue.outputs.number }}
                  issue_body: ${{ steps.issue.outputs.body }}
                  repo_name: ${{ github.event.repository.name || github.repository }}
                  owner: ${{ github.repository_owner }}
                  ai_review_label: "needs triage"
                  prompts_directory: ".github/prompts"
                  labels_to_prompts_mapping: "bug,bug-triage.prompt.yml|enhancement,feature-triage.prompt.yml|question,question-triage.prompt.yml"
                  model: "openai/gpt-4.1"
                  max_tokens: 2000
                  suppress_comments: ${{ env.SUPPRESS_COMMENTS }}
                  suppress_labels: ${{ env.SUPPRESS_LABELS }}

            - name: Post-process triage results
              if: steps.ai-assessment.outputs.ai_assessments != ''
              uses: actions/github-script@v7
              env:
                  ASSESSMENT_OUTPUT: ${{ steps.ai-assessment.outputs.ai_assessments }}
                  SUPPRESS_LABELS: ${{ env.SUPPRESS_LABELS }}
                  ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
                  ISSUE_AUTHOR: ${{ steps.issue.outputs.author }}
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const assessments = JSON.parse(process.env.ASSESSMENT_OUTPUT);
                      const issueNumber = parseInt(process.env.ISSUE_NUMBER);
                      const issueAuthor = process.env.ISSUE_AUTHOR || '';
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const suppressLabels = process.env.SUPPRESS_LABELS === 'true';

                      // -------------------------------------------------------------------
                      // Category → action contract. Every assessment category defined in the
                      // triage prompts MUST appear in exactly one set below so that no category
                      // is a dead end. Matching is case-insensitive substring on the category
                      // text the model emits after "### AI Assessment:".
                      //   escalate        → flag for the team (label + @team ping), keep open
                      //   helpWanted      → label for community contribution
                      //   backlog         → valuable enhancement, team-filterable, keep open
                      //   authorFeedback  → request info from author (label + @author ping)
                      //   misconfig       → guidance given; keep open for author to confirm
                      //   autoClose       → safe to close automatically (never a bug report)
                      //   resolvedByChange→ already fixed by a merged PR; close as completed with citation
                      // -------------------------------------------------------------------
                      const ESCALATE = ['potential bug', 'needs team review', 'needs discussion'];
                      const HELP_WANTED = ['help wanted'];
                      const BACKLOG = ['valuable enhancement'];
                      const AUTHOR_FEEDBACK = ['needs author feedback', 'requires additional details'];
                      const MISCONFIG = ['likely misconfiguration'];
                      const RESOLVED_BY_CHANGE = ['resolved by recent change'];
                      const AUTO_CLOSE = ['answered', 'redirect to docs', 'out of scope'];

                      let needsHumanReview = false;
                      let addHelpWanted = false;
                      let addBacklog = false;
                      let needsAuthorFeedback = false;
                      let isMisconfig = false;
                      let isResolvedByChange = false;
                      let canAutoClose = false;
                      let closeReason = 'completed';

                      for (const assessment of assessments) {
                        const label = (assessment.assessmentLabel || '').toLowerCase();

                        if (ESCALATE.some(s => label.includes(s))) needsHumanReview = true;
                        if (HELP_WANTED.some(s => label.includes(s))) addHelpWanted = true;
                        if (BACKLOG.some(s => label.includes(s))) addBacklog = true;
                        if (AUTHOR_FEEDBACK.some(s => label.includes(s))) needsAuthorFeedback = true;
                        if (MISCONFIG.some(s => label.includes(s))) isMisconfig = true;
                        if (RESOLVED_BY_CHANGE.some(s => label.includes(s))) isResolvedByChange = true;
                        if (AUTO_CLOSE.some(s => label.includes(s))) {
                          canAutoClose = true;
                          // Out-of-scope feature requests close as "not planned" rather than "completed"
                          if (label.includes('out of scope')) closeReason = 'not_planned';
                        }

                        // Log for job summary
                        core.info(`Prompt: ${assessment.prompt}, Label: ${assessment.assessmentLabel}`);
                      }

                      // Skip label changes in summary-only mode (Phase 3)
                      if (suppressLabels) {
                        core.info('Labels suppressed — logging decisions only.');
                        core.exportVariable('LABEL_DECISIONS', JSON.stringify({
                          needsHumanReview, addHelpWanted, addBacklog, needsAuthorFeedback,
                          isMisconfig, isResolvedByChange, canAutoClose, closeReason,
                          assessmentLabels: assessments.map(a => a.assessmentLabel),
                        }));
                        return;
                      }

                      if (needsHumanReview) {
                        // Highest precedence: a human must look at this. Never auto-close.
                        await github.rest.issues.addLabels({
                          owner, repo, issue_number: issueNumber,
                          labels: ['ai:needs team attention']
                        });
                        await github.rest.issues.createComment({
                          owner, repo, issue_number: issueNumber,
                          body: '🔔 @microsoft/fabric-cicd — This issue has been flagged by AI triage as requiring team attention. Please review the assessment above.'
                        });
                        core.info('Escalated to team.');
                      } else if (isResolvedByChange) {
                        // The AI matched this issue to a pull request already merged into main
                        // (cited in the assessment above). Close as completed with an invitation
                        // to reopen if the merged change does not actually resolve it.
                        await github.rest.issues.createComment({
                          owner, repo, issue_number: issueNumber,
                          body: '✅ This issue appears to be resolved by a change recently merged into the `main` branch (cited in the assessment above). Closing as completed — the fix will be available in the upcoming release. If the problem persists after upgrading, please reply here or reopen the issue.'
                        });
                        await github.rest.issues.update({
                          owner, repo, issue_number: issueNumber,
                          state: 'closed', state_reason: 'completed'
                        });
                        core.info('Closed as resolved by a recent merged change.');
                      } else {
                        // Request more information from the author (plugs into the
                        // resourceManagement policy loop that re-triages on the author's reply).
                        if (needsAuthorFeedback) {
                          await github.rest.issues.addLabels({
                            owner, repo, issue_number: issueNumber,
                            labels: ['needs author feedback']
                          });
                          const mention = issueAuthor ? `@${issueAuthor} — ` : '';
                          await github.rest.issues.createComment({
                            owner, repo, issue_number: issueNumber,
                            body: `⏳ ${mention}additional information is needed to continue triage. Please review the assessment above and reply with the requested details.`
                          });
                          core.info('Requested author feedback.');
                        }

                        // Community contribution candidate.
                        if (addHelpWanted) {
                          await github.rest.issues.addLabels({
                            owner, repo, issue_number: issueNumber,
                            labels: ['help wanted']
                          });
                          core.info('Added "help wanted" label based on AI assessment.');
                        }

                        // Valuable enhancement: make it team-filterable without pinging the team.
                        if (addBacklog) {
                          await github.rest.issues.addLabels({
                            owner, repo, issue_number: issueNumber,
                            labels: ['ai:backlog candidate']
                          });
                          core.info('Marked as backlog candidate.');
                        }

                        // Likely misconfiguration: guidance is in the AI comment. Label for
                        // visibility but keep the issue open so the author can confirm.
                        if (isMisconfig) {
                          await github.rest.issues.addLabels({
                            owner, repo, issue_number: issueNumber,
                            labels: ['ai:likely misconfiguration']
                          });
                          core.info('Labelled likely misconfiguration — left open for author confirmation.');
                        }

                        // Auto-close only when the AI fully resolved the issue and nothing
                        // above requires the issue to stay open. Bug reports never reach here.
                        if (canAutoClose && !needsAuthorFeedback && !addHelpWanted && !addBacklog && !isMisconfig) {
                          await github.rest.issues.update({
                            owner, repo, issue_number: issueNumber,
                            state: 'closed',
                            state_reason: closeReason
                          });
                          core.info(`Auto-closed issue (${closeReason}) — AI fully resolved it.`);
                        }
                      }

                      // Always remove 'needs triage' — triage is complete regardless of outcome.
                      // (When author feedback is requested, 'needs author feedback' takes over and
                      // the resourceManagement policy re-adds 'needs triage' on the author's reply.)
                      try {
                        await github.rest.issues.removeLabel({
                          owner,
                          repo,
                          issue_number: issueNumber,
                          name: 'needs triage'
                        });
                        core.info('Removed "needs triage" — triage complete.');
                      } catch (e) {
                        core.info(`Could not remove "needs triage" label: ${e.message}`);
                      }

            - name: Generate triage summary
              if: always() && steps.ai-assessment.outputs.ai_assessments != ''
              uses: actions/github-script@v7
              env:
                  ASSESSMENT_OUTPUT: ${{ steps.ai-assessment.outputs.ai_assessments }}
                  LABEL_DECISIONS: ${{ env.LABEL_DECISIONS }}
                  ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
                  ISSUE_TITLE: ${{ steps.issue.outputs.title }}
                  ISSUE_URL: ${{ steps.issue.outputs.html_url }}
              with:
                  script: |
                      const assessments = JSON.parse(process.env.ASSESSMENT_OUTPUT);
                      const issueNumber = process.env.ISSUE_NUMBER;
                      const issueTitle = process.env.ISSUE_TITLE;
                      const issueUrl = process.env.ISSUE_URL;

                      let summary = `## 🤖 AI Triage Report\n\n`;
                      summary += `**Issue:** [#${issueNumber} — ${issueTitle}](${issueUrl})\n\n`;

                      for (const assessment of assessments) {
                        summary += `### Prompt: \`${assessment.prompt}\`\n`;
                        summary += `**Assessment:** \`${assessment.assessmentLabel}\`\n\n`;
                        summary += `<details><summary>Full AI Response</summary>\n\n`;
                        summary += `${assessment.response}\n\n`;
                        summary += `</details>\n\n`;
                      }

                      // Show label decisions
                      const ld = process.env.LABEL_DECISIONS ? JSON.parse(process.env.LABEL_DECISIONS) : null;
                      if (ld) {
                        const blockedByHigher = ld.needsHumanReview || ld.isResolvedByChange;
                        const wouldAutoClose = ld.canAutoClose && !ld.needsAuthorFeedback && !ld.addHelpWanted && !ld.addBacklog && !ld.isMisconfig && !blockedByHigher;
                        summary += `### 🏷️ Label Decisions (not applied — testing mode)\n\n`;
                        summary += `| Decision | Value |\n|----------|-------|\n`;
                        summary += `| AI assessment labels | ${(ld.assessmentLabels || []).map(l => '`' + l + '`').join(', ')} |\n`;
                        summary += `| Would close as resolved by recent change | ${ld.isResolvedByChange && !ld.needsHumanReview ? '✅ Yes (completed)' : '❌ No'} |\n`;
                        summary += `| Would add \`help wanted\` | ${ld.addHelpWanted && !blockedByHigher ? '✅ Yes' : '❌ No'} |\n`;
                        summary += `| Would add \`ai:backlog candidate\` | ${ld.addBacklog && !blockedByHigher ? '✅ Yes' : '❌ No'} |\n`;
                        summary += `| Would add \`ai:likely misconfiguration\` | ${ld.isMisconfig && !blockedByHigher ? '✅ Yes' : '❌ No'} |\n`;
                        summary += `| Would add \`ai:needs team attention\` | ${ld.needsHumanReview ? '✅ Yes' : '❌ No'} |\n`;
                        summary += `| Would request author feedback | ${ld.needsAuthorFeedback && !blockedByHigher ? '✅ Yes' : '❌ No'} |\n`;
                        summary += `| Would remove \`needs triage\` | ✅ Yes (always) |\n`;
                        summary += `| Would auto-close | ${wouldAutoClose ? `✅ Yes (${ld.closeReason || 'completed'})` : '❌ No'} |\n`;
                        summary += `| Would notify team | ${ld.needsHumanReview ? '✅ Yes' : '❌ No'} |\n\n`;
                      }

                      summary += `---\n\n`;

                      core.summary.addRaw(summary);
                      await core.summary.write();

                      const fs = require('fs');
                      fs.mkdirSync('triage-reports', { recursive: true });
                      fs.writeFileSync(
                        `triage-reports/issue-${issueNumber}-triage.md`,
                        summary
                      );

            - name: Upload triage report
              if: always() && steps.ai-assessment.outputs.ai_assessments != ''
              uses: actions/upload-artifact@v4
              with:
                  name: triage-report-issue-${{ steps.issue.outputs.number }}
                  path: triage-reports/
                  retention-days: 30
